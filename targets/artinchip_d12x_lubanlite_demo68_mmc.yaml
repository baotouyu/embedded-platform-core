target: artinchip_d12x_lubanlite_demo68_mmc

platform:
  family: rtos
  vendor: artinchip
  sdk_family: luban-lite
  chip: d12x
  board: demo68-mmc
  kernel: rt-thread

sdk:
  name: sdk-artinchip-luban-lite
  repo: https://github.com/baotouyu/sdk-artinchip-luban-lite.git
  ref: 622ca577b4b33c879bd61367e77229d4c4af8bfc

toolchain:
  source: sdk

ui:
  lvgl_provider: sdk
  lvgl_note: Luban-Lite SDK provides LVGL display and input ports.

sdk_config:
  defconfig: d12x_demo68-mmc_rt-thread_helloworld_defconfig

output:
  ep_package: out/ep/artinchip_d12x_lubanlite_demo68_mmc
  firmware: out/firmware/artinchip_d12x_lubanlite_demo68_mmc
