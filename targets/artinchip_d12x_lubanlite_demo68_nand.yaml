  ref: 0986f399255aa6929b2516bc497b95e9216e0db5

toolchain:
  source: sdk

sdk_config:
  defconfig: d12x_demo68-nand_rt-thread_helloworld_defconfig

output:
  ep_package: out/ep/artinchip_d12x_lubanlite_demo68_nand
  firmware: out/firmware/artinchip_d12x_lubanlite_demo68_nand
