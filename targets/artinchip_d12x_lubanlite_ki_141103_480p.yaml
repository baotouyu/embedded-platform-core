target: artinchip_d12x_lubanlite_ki_141103_480p

platform:
  family: rtos
  vendor: artinchip
  sdk_family: luban-lite
  chip: d12x
  board: KI-141103-480p
  kernel: rt-thread

sdk:
  name: sdk-artinchip-luban-lite
  repo: https://github.com/baotouyu/sdk-artinchip-luban-lite.git
  ref: 622ca577b4b33c879bd61367e77229d4c4af8bfc

toolchain:
  source: sdk

ui:
  lvgl_provider: sdk
  lvgl_note: Luban-Lite SDK provides LVGL display and input ports.

sdk_config:
  defconfig: d12x_KI-141103-480p_rt-thread_ep_app_defconfig

output:
  ep_package: out/ep/artinchip_d12x_lubanlite_ki_141103_480p
  firmware: out/firmware/artinchip_d12x_lubanlite_ki_141103_480p
