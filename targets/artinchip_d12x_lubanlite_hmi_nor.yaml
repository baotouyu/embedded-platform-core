target: artinchip_d12x_lubanlite_hmi_nor

platform:
  family: rtos
  vendor: artinchip
  sdk_family: luban-lite
  chip: d12x
  board: hmi-nor
  kernel: rt-thread

sdk:
  name: sdk-artinchip-luban-lite
  repo: https://github.com/baotouyu/sdk-artinchip-luban-lite.git
  ref: 7f3f5fbd54dc5ebcafb4aff2d0023bda170496fd

toolchain:
  source: sdk

sdk_config:
  defconfig: d12x_hmi-nor_rt-thread_helloworld_defconfig

output:
  ep_package: out/ep/artinchip_d12x_lubanlite_hmi_nor
  firmware: out/firmware/artinchip_d12x_lubanlite_hmi_nor
